<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#005bbb">
    <meta name="description" content="Morning Prep checklist for Domino's opening prep.">
    <title>Morning Prep</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css">
    <script src="data.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <div class="header-top">
        <div>
          <p class="eyebrow">Domino's Opening Prep</p>
          <h1>Morning Prep</h1>
        </div>
        <button class="install-button" id="installButton" type="button" hidden>Install</button>
      </div>
      <div class="overall">
        <div class="overall-copy">
          <span>Overall Progress</span>
          <strong id="overallPercent">0%</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <span id="overallBar"></span>
        </div>
        <p id="overallStatus">Choose a prep list to begin.</p>
      </div>
    </header>

    <main>
      <section class="day-switch" aria-label="Prep schedule">
        <button class="day-option is-active" type="button" data-schedule="weekday">
          <span>Sunday-Thursday</span>
          <small>Standard open</small>
        </button>
        <button class="day-option" type="button" data-schedule="weekend">
          <span>Friday-Saturday</span>
          <small>High volume</small>
        </button>
      </section>

      <section class="actions" aria-label="Checklist actions">
        <button class="reset-button" id="resetButton" type="button">Reset Checklist</button>
      </section>

      <section id="checklist" class="checklist" aria-live="polite"></section>
    </main>

    <div class="celebration" id="celebration" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
      <strong>Prep Complete</strong>
    </div>
  </body>
</html>
